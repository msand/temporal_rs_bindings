name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    name: Build - ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Set cross-compilation linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build native addon
        run: npx napi build --platform --release --cargo-cwd crates/temporal-napi --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binding-${{ matrix.target }}
          path: temporal_rs.*.node
          if-no-files-found: error

  build-wasm:
    runs-on: ubuntu-latest
    name: Build - WASM

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM
        run: npm run build:wasm

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wasm-pkg
          path: wasm-pkg/

  lint:
    runs-on: ubuntu-latest
    name: Lint & Typecheck

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build NAPI (needed for type imports)
        run: npx napi build --platform --release --cargo-cwd crates/temporal-napi

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    name: Test - ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: binding-${{ matrix.target }}
          path: .

      - name: Build TypeScript conformance layer
        run: npx tsup

      - name: Run tests
        run: npm test

  test262:
    needs: build
    runs-on: ubuntu-latest
    name: Test262 Conformance

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: binding-x86_64-unknown-linux-gnu
          path: .

      - name: Build TypeScript conformance layer
        run: npx tsup

      - name: Run Test262
        run: node test262-runner.mjs --write-failures

      - name: Check failure count
        run: |
          FAIL_COUNT=$(wc -l < test262-failures.txt)
          echo "Failures: $FAIL_COUNT"
          if [ "$FAIL_COUNT" -gt 2 ]; then
            echo "::error::Test262 regression: $FAIL_COUNT failures (expected ≤ 2)"
            cat test262-failures.txt
            exit 1
          fi

  publish:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true'
    needs: [test, lint, build-wasm]
    runs-on: ubuntu-latest
    name: Publish to npm
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate NAPI bindings and type definitions
        run: npx napi build --platform --release --cargo-cwd crates/temporal-napi

      - name: Build TypeScript conformance layer
        run: npx tsup

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -name "*.node" | sort

      - name: Move artifacts to platform packages
        run: |
          mv artifacts/binding-aarch64-apple-darwin/temporal_rs.darwin-arm64.node npm/darwin-arm64/
          mv artifacts/binding-x86_64-apple-darwin/temporal_rs.darwin-x64.node npm/darwin-x64/
          mv artifacts/binding-x86_64-unknown-linux-gnu/temporal_rs.linux-x64-gnu.node npm/linux-x64-gnu/
          mv artifacts/binding-x86_64-unknown-linux-musl/temporal_rs.linux-x64-musl.node npm/linux-x64-musl/
          mv artifacts/binding-aarch64-unknown-linux-gnu/temporal_rs.linux-arm64-gnu.node npm/linux-arm64-gnu/
          mv artifacts/binding-x86_64-pc-windows-msvc/temporal_rs.win32-x64-msvc.node npm/win32-x64-msvc/
          mv artifacts/binding-aarch64-pc-windows-msvc/temporal_rs.win32-arm64-msvc.node npm/win32-arm64-msvc/

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/*/; do
            cd "$dir"
            npm publish --access public --provenance || true
            cd ../..
          done

      - name: Publish root package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
